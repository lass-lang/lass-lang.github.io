<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lass — CSS + TypeScript. Nothing else.</title>
  <meta name="description" content="A CSS preprocessor that uses real TypeScript instead of inventing a new language. JavaScript works too. Compiles to static CSS at build time.">
  <link rel="stylesheet" href="https://assets.lass-lang.dev/css/index.css">
  <link rel="stylesheet" href="{{css}}">
</head>
<body>
  <nav class="site-nav">
    <a href="{{root}}">Lass</a>
    <a href="{{root}}getting-started/">Get Started</a>
    <a href="{{root}}ecosystem/">Ecosystem</a>
    <a href="{{root}}tooling/">Tooling</a>
    <a href="{{root}}approach/">Approach</a>
    <a href="{{root}}examples/">Examples</a>
    <a href="https://docs.lass-lang.dev/">Docs</a>
    <a href="{{root}}llms.txt">llms.txt</a>
  </nav>
  <main class="page">
    {{content}}
  </main>
  <script>
  // Copy button — hero install command only
  (function() {
    var pre = document.querySelector('.language-bash');
    if (!pre) return;
    var wrap = pre.closest('pre');
    if (!wrap) return;
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.onclick = function() {
      navigator.clipboard.writeText(pre.textContent.trim());
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    };
    wrap.style.position = 'relative';
    btn.style.position = 'absolute';
    btn.style.top = '0.5rem';
    btn.style.right = '0.5rem';
    wrap.appendChild(btn);
  })();
  // Language label for code blocks
  (function() {
    var langNames = { lass: 'Lass', css: 'CSS', html: 'HTML', js: 'JavaScript', javascript: 'JavaScript', ts: 'TypeScript', typescript: 'TypeScript', bash: 'Bash', json: 'JSON', scss: 'SCSS', toml: 'TOML', yaml: 'YAML', markdown: 'Markdown' };
    document.querySelectorAll('pre.shiki').forEach(function(pre) {
      var code = pre.querySelector('code');
      if (!code) return;
      var match = code.className.match(/language-(\w+)/);
      if (!match) return;
      var label = document.createElement('span');
      label.className = 'code-lang';
      label.textContent = langNames[match[1]] || match[1];
      pre.style.position = 'relative';
      pre.appendChild(label);
    });
  })();
  </script>
</body>
</html>
